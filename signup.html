<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LVBTN Signup & KYC</title>
  <style>
    body {
      background: #fdf2f8;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 20px;
    }
    button {
      background-color: #e60073;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc005f;
    }
    #walletAddress, #kycStatus, #tierInfo {
      font-weight: bold;
      margin: 10px 0;
    }
    ul {
      list-style: none;
      text-align: left;
      max-width: 400px;
      margin: 20px auto;
    }
    ul li {
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <h2>Sign Up & KYC Verification</h2>
  <button id="connectWalletBtn">Connect Wallet</button>
  <p id="walletAddress"></p>
  <p id="kycStatus"></p>
  <p id="tierInfo"></p>

  <a href="https://verify-with.blockpass.org/?clientId=volunteer_coin_project_68f8b" target="_blank">
    <button>Start KYC</button>
  </a>

  <ul>
    <li>💗 LVBTN Token Earnings:</li>
    <li>• Tier 1 – 1 LVBTN/hr (basic signup)</li>
    <li>• Tier 2 – 1.25 LVBTN/hr (KYC + driver)</li>
    <li>• Tier 3 – 1.5 LVBTN/hr (KYC + 2 refs + 25+ hours)</li>
  </ul>

  <button onclick="window.location.href='login.html'">Go to Login</button>

  <script type="module" src="./connectWallet.js"></script>
  <script type="module" src="./setupKycDom.js"></script>
  <script type="module">
    import { checkKYC } from './kycUtils.js';
    document.getElementById('connectWalletBtn').addEventListener('click', async () => {
      const wallet = await window.connectWalletBtn();
      if (wallet) {
        document.getElementById('walletAddress').textContent = wallet;
        await checkKYC(wallet);
      }
    });
  </script>
</body>
</html>
