<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LoveButton Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f7f7f7;
      color: #333;
      text-align: center;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      width: 90%;
      max-width: 300px;
      font-size: 16px;
    }
    button {
      background-color: #ff3366;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>

  <!-- ✅ Firebase Setup -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ⚠️ Replace with your real Firebase config:
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.firebasestorage.app",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signupUser = () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Signup successful! Redirecting...");
          window.location.href = "index.html"; // ✅ redirect to homepage
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    };
  </script>
</head>

<body>
  <h2>💖 Sign Up for LoveButton</h2>
  <input type="email" id="email" placeholder="Email Address" required /><br />
  <input type="password" id="password" placeholder="Password (min 6 chars)" required /><br />
  <button onclick="signupUser()">Create Account</button>
</body>
</html>
