<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connect Wallet</title>
  <style>
    body {
      background-color: #fff0f5;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background-color: #fdf2f8;
    }
    .btn {
      background-color: #e60073;
      color: white;
      padding: 12px 24px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 10px;
    }
    .btn:hover {
      background-color: #cc005f;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 40px 20px;
    }
#wallet-status {
  margin-top: 20px;
  font-weight: bold;
  color: green;
}
    h2 {
      color: #e60073;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      margin: 8px 0;
      font-size: 16px;
    }

    .btn, .home-btn {
      background-color: #e60073;
      color: white;
      padding: 12px 24px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 15px 10px;
    }

    .btn:hover, .home-btn:hover {
      background-color: #cc005f;
    }

    .love-icon {
      height: 80px;
      margin-top: 20px;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      color: #444;
    }

    #status.success {
      color: green;
    }

    #status.pending {
      color: orange;
    }

    #status.error {
      color: red;
    }
  </style>
</head>
<body>
  <h2>Connect Your Wallet</h2>
  <p>Required to verify KYC status and earn LVBTN tokens.</p>

  <div id="walletStatus" style="color: red; margin-top: 10px;">Wallet not connected</div>
  <p id="kycStatus" style="...">KYC check</p>
  <button id="connectWalletBtn">Connect Phantom Wallet</button>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
    authDomain: "lovebutton-heaven.firebaseapp.com",
    projectId: "lovebutton-heaven",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  document.addEventListener("DOMContentLoaded", () => {
    const connectWalletBtn = document.getElementById("connectWalletBtn");
    const walletStatus = document.getElementById("walletStatus");
    const kycStatus = document.getElementById("kycStatus");

    connectWalletBtn.addEventListener("click", async () => {
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          const walletAddress = resp.publicKey.toString();
          walletStatus.textContent = `✅ Connected: ${walletAddress}`;
          localStorage.setItem("connectedWallet", walletAddress);

          if (kycStatus) {
            kycStatus.textContent = "KYC status: checking...";
            checkKYCStatus(walletAddress);
          }
        } catch (err) {
          console.error("Wallet connection error:", err);
        }
      } else {
        alert("Phantom wallet not found.");
      }
    });

    async function checkKYCStatus(walletAddress) {
      try {
        const doc = await db.collection("verifiedKYC").doc(walletAddress).get();
        if (doc.exists) {
          const status = doc.data().status || "approved";
          if (status === "approved") {
            kycStatus.textContent = "✅ KYC Approved";
            kycStatus.style.color = "green";
          } else {
            kycStatus.textContent = "🕐 KYC Pending";
            kycStatus.style.color = "orange";
          }
        } else {
          kycStatus.textContent = "❌ KYC Not Found";
          kycStatus.style.color = "red";
        }
      } catch (error) {
        console.error("KYC Fetch Error:", error);
        kycStatus.textContent = "❌ Error checking KYC";
        kycStatus.style.color = "red";
      }
    }
  });
</script>
</body>
</html>
