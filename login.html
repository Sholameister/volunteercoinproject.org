<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveButton Volunteer Login</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- Solana Phantom and Solflare Wallets -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff0f2;
      text-align: center;
      padding: 20px;
    }
    .wallet-btn {
      background: #c72c48;
      color: white;
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    img.preview {
      width: 150px;
      height: auto;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h2>❤️ LoveButton Volunteer Login</h2>

  <button class="wallet-btn" id="connectPhantomBtn">Connect Phantom</button>
  <button class="wallet-btn" id="connectSolflareBtn">Connect Solflare</button>
  <p><strong>Wallet:</strong> <span id="walletDisplay">Not connected</span></p>

  <hr>
  <p><strong>Before Photo:</strong><br><input type="file" id="beforePhoto" accept="image/*"></p>
  <p><strong>After Photo:</strong><br><input type="file" id="afterPhoto" accept="image/*"></p>

  <button class="wallet-btn" onclick="startVolunteerSession()">Start Volunteering</button>
  <button class="wallet-btn" onclick="stopVolunteerSession()">Stop Volunteering</button>

  <div id="sessionStatus" style="margin-top: 20px;"></div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.appspot.com",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8",
      measurementId: "G-0261HYV08P"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentWallet = null;
    let startTime = null;
    let beforePhotoURL = null;

    // Connect Phantom Wallet
    document.getElementById("connectPhantomBtn").addEventListener("click", async () => {
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          currentWallet = resp.publicKey.toString();
          localStorage.setItem("walletAddress", currentWallet);
          document.getElementById("walletDisplay").innerText = currentWallet;
        } catch (e) {
          alert("Phantom connection failed.");
        }
      } else {
        alert("Phantom Wallet not found. Please install it.");
      }
    });

    // Connect Solflare Wallet
    document.getElementById("connectSolflareBtn").addEventListener("click", async () => {
      try {
        const solflare = new window.Solflare();
        await solflare.connect();
        currentWallet = solflare.publicKey.toString();
        localStorage.setItem("walletAddress", currentWallet);
        document.getElementById("walletDisplay").innerText = currentWallet;
      } catch {
        alert("Solflare not available.");
      }
    });

    // Start Volunteering Session
    async function startVolunteerSession() {
      const file = document.getElementById("beforePhoto").files[0];
      if (!file) return alert("Upload BEFORE photo first.");
      if (!currentWallet) return alert("Connect your wallet first.");

      const ref = storage.ref().child(`photos/${Date.now()}_before.jpg`);
      await ref.put(file);
      beforePhotoURL = await ref.getDownloadURL();

      startTime = new Date();
      navigator.geolocation.getCurrentPosition((pos) => {
        localStorage.setItem("sessionStart", JSON.stringify({
          time: startTime.toISOString(),
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          beforePhotoURL
        }));
        document.getElementById("sessionStatus").innerText = `✅ Started at ${startTime.toLocaleTimeString()}`;
      });
    }

    // Stop Volunteering Session
    async function stopVolunteerSession() {
      const file = document.getElementById("afterPhoto").files[0];
      if (!file) return alert("Upload AFTER photo first.");
      const startData = JSON.parse(localStorage.getItem("sessionStart"));
      if (!startData || !currentWallet) return alert("Session not started or wallet missing.");

      const ref = storage.ref().child(`photos/${Date.now()}_after.jpg`);
      await ref.put(file);
      const afterPhotoURL = await ref.getDownloadURL();

      const stopTime = new Date();
      const duration = (stopTime - new Date(startData.time)) / (1000 * 60 * 60);
      const tokensEarned = Math.round(duration * 100) / 100;
      const usdValue = tokensEarned * 2.5;

      navigator.geolocation.getCurrentPosition(async (pos) => {
        await db.collection("volunteerSessions").add({
          wallet: currentWallet,
          startTime: new Date(startData.time),
          stopTime,
          durationHours: duration,
          tokensEarned,
          usdValue,
          startLocation: { lat: startData.lat, lng: startData.lng },
          stopLocation: { lat: pos.coords.latitude, lng: pos.coords.longitude },
          activity: "General Volunteering",
          date: stopTime.toLocaleDateString(),
          beforePhotoURL: startData.beforePhotoURL,
          afterPhotoURL
        });

        document.getElementById("sessionStatus").innerHTML = `
          ✅ Session Saved!<br>
          🕒 Duration: ${duration.toFixed(2)} hrs<br>
          💖 LVBTN: ${tokensEarned} ($${usdValue.toFixed(2)})<br><br>
          📸 Before:<br><img src="${startData.beforePhotoURL}" class="preview"><br>
          📸 After:<br><img src="${afterPhotoURL}" class="preview">
        `;

        document.getElementById("beforePhoto").value = "";
        document.getElementById("afterPhoto").value = "";
        localStorage.removeItem("sessionStart");
      });
    }
  </script>
</body>
</html>
