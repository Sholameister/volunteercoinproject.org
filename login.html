<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveButton Wallet Login</title>

  <!-- Solana Wallet Adapter CDN -->
  <script src="https://unpkg.com/@solana/wallet-adapter-wallets@latest/lib/umd/index.iife.min.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-base@latest/lib/umd/index.iife.min.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-wallets@latest/lib/umd/index.iife.min.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-react-ui/styles.css"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff0f2;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #c72c48;
    }

    .wallet-btn {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      background-color: #c72c48;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #exchangeModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    #exchangeModalContent {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      text-align: center;
    }
  </style>
</head>

<body>
  <h1>Welcome Back Volunteers!</h1>
  <p>Connect your wallet to continue</p>

  <!-- Wallet Buttons -->
  <button class="wallet-btn" onclick="connectPhantom()">Connect Phantom</button>
  <button class="wallet-btn" onclick="connectSolflare()">Connect Solflare</button>
  <button class="wallet-btn" onclick="connectBackpack()">Connect Backpack</button>

  <!-- Exchange Rate Modal -->
  <div id="exchangeModal">
    <div id="exchangeModalContent">
      <h2 style="color:#c72c48;">Current Exchange Rate</h2>
      <p style="font-size:1.5em;"><strong>1 LVBTN = $2.50 USD</strong></p>
      <p style="font-style:italic; margin-bottom:20px;">Updated manually until trading resumes after <strong>July 20, 2025</strong>.</p>
      <h3>🔶 Live Bitcoin (BTC) Price</h3>
      <p id="btcPrice" style="font-size:1.2em;">Loading...</p>
      <button onclick="closeExchangeModal()" style="margin-top:20px; padding:10px 20px; font-size:1em;">Continue</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.firebasestorage.app",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8",
      measurementId: "G-0261HYV08P"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <!-- Wallet Connect Scripts -->
  <script>
  let currentWallet = null;

  function showExchangeModal() {
    document.getElementById("exchangeModal").style.display = "flex";
    const btc = 118016; // Static BTC value for now
    document.getElementById("btcPrice").innerText = `BTC: $${btc.toLocaleString()}`;
  }

  function closeExchangeModal() {
    document.getElementById("exchangeModal").style.display = "none";
    if (currentWallet) {
      const walletDisplay = document.createElement("p");
      walletDisplay.textContent = `✅ Connected Wallet: ${currentWallet}`;
      walletDisplay.style.color = "#333";
      walletDisplay.style.marginTop = "20px";
      walletDisplay.style.fontWeight = "bold";
      document.body.appendChild(walletDisplay);

      // Optional: save wallet session for later use
      localStorage.setItem("lvbtn_wallet", currentWallet);
    }
  }

  async function connectPhantom() {
    try {
      const provider = window.solana;
      if (provider?.isPhantom) {
        const resp = await provider.connect();
        currentWallet = resp.publicKey.toString();
        console.log("Phantom connected:", currentWallet);
        showExchangeModal();
      } else {
        alert("Phantom wallet not found.");
      }
    } catch (err) {
      console.error("Phantom connection failed", err);
    }
  }

  async function connectSolflare() {
    try {
      const solflare = new window.Solflare();
      if (!solflare.isConnected) await solflare.connect();
      currentWallet = solflare.publicKey.toString();
      console.log("Solflare connected:", currentWallet);
      showExchangeModal();
    } catch (err) {
      alert("Solflare not installed.");
    }
  }

  async function connectBackpack() {
    alert("Backpack wallet support coming soon!");
  }

  // Optional: auto-load saved wallet on page load
  window.onload = () => {
    const savedWallet = localStorage.getItem("lvbtn_wallet");
    if (savedWallet) {
      const walletDisplay = document.createElement("p");
      walletDisplay.textContent = `✅ Connected Wallet: ${savedWallet} (from previous session)`;
      walletDisplay.style.color = "#333";
      walletDisplay.style.marginTop = "20px";
      walletDisplay.style.fontWeight = "bold";
      document.body.appendChild(walletDisplay);
    }
  }
</script>
</body>
</html>
