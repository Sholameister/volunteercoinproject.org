<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveButton Login</title>

  <!-- Solana Wallet Adapter CDN -->
  <script src="https://unpkg.com/@solana/wallet-adapter-wallets@0.9.11/lib/cdn.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-base@0.9.19/lib/cdn.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-web@0.9.19/lib/cdn.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9f9f9;
    }
    #wallet-buttons {
      margin-top: 30px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
    #wallet-address {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Welcome to LoveButton</h1>
  <p>Connect your wallet to begin:</p>

  <div id="wallet-buttons">
    <button id="phantom-button">Connect Phantom</button>
    <button id="solflare-button">Connect Solflare</button>
    <button id="backpack-button">Connect Backpack</button>
  </div>

  <div id="wallet-address"></div>

  <script>
    const { PhantomWalletAdapter, SolflareWalletAdapter, BackpackWalletAdapter } = window.SolanaWalletAdapterWallets;

    const phantom = new PhantomWalletAdapter();
    const solflare = new SolflareWalletAdapter();
    const backpack = new BackpackWalletAdapter();

    async function connectAndDisplay(wallet, name) {
      try {
        await wallet.connect();
        const address = wallet.publicKey.toString();
        document.getElementById("wallet-address").innerText = `Connected with ${name}: ${address}`;
      } catch (err) {
        alert(`Failed to connect ${name}: ${err.message}`);
        console.error(err);
      }
    }

    document.getElementById("phantom-button").onclick = () => connectAndDisplay(phantom, "Phantom");
    document.getElementById("solflare-button").onclick = () => connectAndDisplay(solflare, "Solflare");
    document.getElementById("backpack-button").onclick = () => connectAndDisplay(backpack, "Backpack");
  </script>
</body>
</html>
