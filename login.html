<!DOCTYPE html>
<html>
<head>
  <title>LoveButton Volunteer Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fdf2f8;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #e60073;
    }
    input, button {
      margin: 10px;
      padding: 12px;
      width: 80%;
      max-width: 400px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #e60073;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc005f;
    }
    #summaryBox {
      display: none;
      margin-top: 20px;
      background-color: #fff0f5;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #e60073;
    }
  </style>
</head>
<body>

  <h1>LoveButton Volunteer Tracker</h1>

  <!-- Wallet Connection -->
  <button id="connectWalletBtn">Connect Wallet</button>
  <p id="walletAddress"></p>

  <!-- Before / After Photos -->
  <h3>Before Volunteering Photo</h3>
  <input type="file" id="beforePhoto" accept="image/*">

  <h3>After Volunteering Photo</h3>
  <input type="file" id="afterPhoto" accept="image/*">

  <!-- Start / Stop Buttons -->
  <br>
  <button id="startBtn" onclick="startVolunteering()">Start Volunteering</button>
  <button id="stopBtn" onclick="stopVolunteering()">Stop Volunteering</button>

  <!-- Summary -->
  <div id="summaryBox"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>

  <!-- Firebase Config -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.firebasestorage.app",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8",
      measurementId: "G-0261HYV08P"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <!-- Solana Wallet Adapter -->
  <script src="https://unpkg.com/@solana/wallet-adapter-wallets@0.11.13/lib/cdn/index.iife.min.js"></script>

  <script>
    const { PhantomWalletAdapter, SolflareWalletAdapter } = solanaWalletAdapterWallets;
    let wallet = null;

    const phantom = new PhantomWalletAdapter();
    const solflare = new SolflareWalletAdapter();

    document.getElementById("connectWalletBtn").addEventListener("click", async () => {
      try {
        await phantom.connect();
        wallet = phantom;
        document.getElementById("walletAddress").innerText = `Connected: ${wallet.publicKey.toString()}`;
        console.log("Wallet connected:", wallet.publicKey.toString());
      } catch (e) {
        console.error("Wallet connect error:", e);
        alert("Could not connect Phantom wallet.");
      }
    });

    let sessionStartTime = null;
    let sessionGeo = null;

    async function startVolunteering() {
      const beforePhoto = document.getElementById('beforePhoto').files[0];
      if (!wallet || !wallet.publicKey) {
        alert("Please connect your wallet first.");
        return;
      }
      if (!beforePhoto) {
        alert("Please upload your BEFORE photo.");
        return;
      }

      sessionStartTime = new Date();
      sessionGeo = await getGeolocation();

      alert(`✅ You have begun volunteering for Volunteer Coin Project Foundation!
📅 ${sessionStartTime.toLocaleDateString()}
🕒 ${sessionStartTime.toLocaleTimeString()}
📍 ${sessionGeo}
🎁 Vouchers: Check your dashboard if eligible`);

      console.log("Session started:", sessionStartTime, "Location:", sessionGeo);
    }

    async function stopVolunteering() {
      const afterPhoto = document.getElementById('afterPhoto').files[0];
      if (!wallet || !wallet.publicKey) {
        alert("Please connect your wallet first.");
        return;
      }
      if (!afterPhoto) {
        alert("Please upload your AFTER photo.");
        return;
      }
      if (!sessionStartTime) {
        alert("You must click START before clicking STOP.");
        return;
      }

      const sessionEndTime = new Date();
      const durationMs = sessionEndTime - sessionStartTime;
      const hours = parseFloat((durationMs / 3600000).toFixed(2));
      const tokens = hours; // 1 LVBTN per hour
      const rate = 2.50;
      const usd = parseFloat((tokens * rate).toFixed(2));

      // Save session to Firestore
      try {
        await db.collection("volunteerSessions").add({
          wallet: wallet.publicKey.toString(),
          timestampStart: firebase.firestore.Timestamp.fromDate(sessionStartTime),
          timestampEnd: firebase.firestore.Timestamp.fromDate(sessionEndTime),
          durationHours: hours,
          tokensEarned: tokens,
          usdValue: usd,
          fixedRate: rate,
          geolocation: sessionGeo,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Show session summary
        const summaryBox = document.getElementById("summaryBox");
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `
          <h3>✅ Session Complete</h3>
          <p>Start Time: ${sessionStartTime.toLocaleTimeString()}</p>
          <p>End Time: ${sessionEndTime.toLocaleTimeString()}</p>
          <p>Date: ${sessionStartTime.toLocaleDateString()}</p>
          <p>LVBTN Earned: <strong>${tokens}</strong></p>
          <p>Value at $2.50: <strong>$${usd}</strong></p>
        `;

        console.log("Session saved:", {
          wallet: wallet.publicKey.toString(),
          start: sessionStartTime,
          end: sessionEndTime,
          hours,
          tokens,
          usd
        });

        // Reset session
        sessionStartTime = null;
        sessionGeo = null;

      } catch (e) {
        console.error("Error saving session:", e);
        alert("Error saving session. Check console.");
      }
    }

    function getGeolocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve("Unknown Location");
        } else {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const lat = position.coords.latitude.toFixed(4);
              const lon = position.coords.longitude.toFixed(4);
              resolve(`Lat: ${lat}, Lon: ${lon}`);
            },
            () => {
              resolve("Geolocation Denied");
            }
          );
        }
      });
    }
  </script>
</body>
</html>
