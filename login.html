<!DOCTYPE html>
<html>
<head>
  <title>LoveButton Volunteer Logger</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background-color: #fdf2f8;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #e60073;
    }
    input, button {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      background-color: #e60073;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc005f;
    }
    #summaryBox, #afterPhotosBox {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background-color: #fff0f5;
      border: 1px solid #e60073;
      display: none;
    }
    img.afterPhoto {
      max-width: 150px;
      margin: 5px;
      border-radius: 8px;
      border: 2px solid #e60073;
    }
  </style>
</head>
<body>

  <h1>Volunteer Session Tracker</h1>

  <button onclick="connectWallet()">Connect Phantom Wallet</button>
  <p id="walletAddress"></p>

  <h3>Upload BEFORE Volunteering Photo</h3>
  <input type="file" id="beforePhoto" accept="image/*">

  <h3>Upload AFTER Volunteering Photo</h3>
  <input type="file" id="afterPhoto" accept="image/*">

  <button onclick="startVolunteering()">Start Volunteering</button>
  <button onclick="stopVolunteering()">Stop Volunteering</button>

  <div id="summaryBox"></div>
  <div id="afterPhotosBox"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-storage-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.appspot.com",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let walletAddress = "";
    let sessionStartTime = null;
    let sessionGeo = "";

    async function connectWallet() {
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          walletAddress = resp.publicKey.toString();
          document.getElementById("walletAddress").innerText = "Wallet: " + walletAddress;
        } catch (err) {
          alert("Wallet connection rejected.");
        }
      } else {
        alert("Phantom wallet not found. Please install Phantom.");
      }
    }

    async function startVolunteering() {
      const beforePhoto = document.getElementById("beforePhoto").files[0];
      if (!walletAddress) return alert("Connect your wallet first.");
      if (!beforePhoto) return alert("Upload your BEFORE photo first.");

      sessionStartTime = new Date();
      sessionGeo = await getLocation();

      alert(`✅ You have begun volunteering for Volunteer Coin Project Foundation!
📅 ${sessionStartTime.toLocaleDateString()}
🕒 ${sessionStartTime.toLocaleTimeString()}
📍 ${sessionGeo}`);

      console.log("Session started at", sessionStartTime);
    }

    async function stopVolunteering() {
      const afterPhoto = document.getElementById("afterPhoto").files[0];
      if (!walletAddress) return alert("Connect your wallet first.");
      if (!afterPhoto) return alert("Upload your AFTER photo first.");
      if (!sessionStartTime) return alert("Click START before STOP.");

      const sessionEndTime = new Date();
      const durationMs = sessionEndTime - sessionStartTime;
      const hours = parseFloat((durationMs / 3600000).toFixed(2));
      const tokens = hours;
      const rate = 2.5;
      const usd = parseFloat((tokens * rate).toFixed(2));
let afterUrl = "";
try {
  console.log("Uploading after photo...");
  const afterRef = storage.ref().child(`afterPhotos/${walletAddress}_${sessionEndTime.getTime()}`);
  await afterRef.put(afterPhoto);
  afterUrl = await afterRef.getDownloadURL();
  console.log("✅ After photo uploaded. URL:", afterUrl);
} catch (e) {
  console.error("❌ Failed to upload after photo:", e);
  alert("Failed to upload AFTER photo. Please check your internet or permissions.");
  return;
}
} catch (e) {
  console.error("❌ Failed to upload after photo:", e);
  alert("Failed to upload AFTER photo.");
  return;
}

      await db.collection("volunteerSessions").add({
        wallet: walletAddress,
        timestampStart: firebase.firestore.Timestamp.fromDate(sessionStartTime),
        timestampEnd: firebase.firestore.Timestamp.fromDate(sessionEndTime),
        geo: sessionGeo,
        durationHours: hours,
        tokensEarned: tokens,
        usdValue: usd,
        afterPhotoUrl: afterUrl,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      document.getElementById("summaryBox").style.display = "block";
      document.getElementById("summaryBox").innerHTML = `
        <h3>✅ Session Complete</h3>
        <p>Start: ${sessionStartTime.toLocaleTimeString()}</p>
        <p>End: ${sessionEndTime.toLocaleTimeString()}</p>
        <p>Date: ${sessionStartTime.toLocaleDateString()}</p>
        <p>LVBTN Earned: ${tokens}</p>
        <p>Value (@ $2.50): $${usd}</p>
      `;

      // Show previous after photos
      const afterPhotosBox = document.getElementById("afterPhotosBox");
      afterPhotosBox.style.display = "block";
      afterPhotosBox.innerHTML = `<h3>Your Previous After Photos</h3>`;
      const snaps = await db.collection("volunteerSessions")
        .where("wallet", "==", walletAddress)
        .orderBy("timestampEnd", "desc")
        .limit(5)
        .get();

      snaps.forEach(doc => {
        const url = doc.data().afterPhotoUrl;
        if (url) {
          const img = document.createElement("img");
          img.src = url;
          img.className = "afterPhoto";
          afterPhotosBox.appendChild(img);
        }
      });

      // Reset
      sessionStartTime = null;
      sessionGeo = "";
    }

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve("Geolocation not supported.");
        } else {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const lat = pos.coords.latitude.toFixed(4);
              const lon = pos.coords.longitude.toFixed(4);
              resolve(`Lat: ${lat}, Lon: ${lon}`);
            },
            () => resolve("Location access denied.")
          );
        }
      });
    }
  </script>
</body>
</html>
