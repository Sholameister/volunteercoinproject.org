<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveButton Login</title>

  <!-- Solana Wallet Adapter CDN -->
  <script src="https://unpkg.com/@solana/wallet-adapter-wallets@0.9.11/lib/cdn.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-base@0.9.19/lib/cdn.js"></script>
  <script src="https://unpkg.com/@solana/wallet-adapter-web@0.9.19/lib/cdn.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9f9f9;
    }
    #wallet-buttons {
      margin-top: 30px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
    #wallet-address {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Welcome to LoveButton</h1>
  <p>Connect your wallet to begin:</p>

  <div id="wallet-buttons"></div>
  <div id="wallet-address"></div>

  <script>
    const { PhantomWalletAdapter, SolflareWalletAdapter, BackpackWalletAdapter } = window.SolanaWalletAdapterWallets;

    const wallets = [
      new PhantomWalletAdapter(),
      new SolflareWalletAdapter(),
      new BackpackWalletAdapter()
    ];

    const container = document.getElementById("wallet-buttons");

    wallets.forEach(wallet => {
      const btn = document.createElement("button");
      btn.innerText = `Connect ${wallet.name}`;
      btn.onclick = async () => {
        try {
          await wallet.connect();
          const address = wallet.publicKey.toString();
          document.getElementById("wallet-address").innerText = `Connected: ${address}`;
          // TODO: Add Firebase logging or redirect here
        } catch (err) {
          alert(`Error connecting to ${wallet.name}: ${err.message}`);
          console.error(err);
        }
      };
      container.appendChild(btn);
    });
  </script>
</body>
</html>
