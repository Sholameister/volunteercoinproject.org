<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveButton Volunteer Logger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Welcome, Volunteer!</h1>
    <p>Track your hours, earn LVBTN tokens, and make an impact 💗</p>
  </header>

  <main style="max-width: 600px; margin: auto; text-align: center;">
    <button id="connectWalletBtn">🔗 Connect Phantom Wallet</button>
    <p id="walletAddress" class="highlight" style="font-weight: bold;"></p>

    <div id="kycStatus"></div>
    <div id="tierInfo"></div>
    <div id="lvbtnPrice" style="margin-bottom: 10px;">Current LVBTN Price: $2.50</div>

    <!-- Step 1: Upload Before Photo -->
    <h3>📸 Before Volunteering</h3>
    <input type="file" id="beforePhoto" accept="image/*" capture="environment" disabled />
    <button id="startVolunteeringBtn" disabled>Start Volunteering</button>

    <!-- Step 2: Upload After Photo -->
    <h3>📸 After Volunteering</h3>
    <input type="file" id="afterPhoto" accept="image/*" capture="environment" disabled />
    <button id="stopVolunteeringBtn" disabled>Stop Volunteering</button>

    <!-- Summary -->
    <div id="summaryBox" class="section" style="margin-top: 30px; display: none;">
      <h3>✅ Session Summary</h3>
      <p id="sessionTimes"></p>
      <p id="tokensEarned"></p>
      <p id="totalLVBTN"></p>
      <p id="usdValue"></p>
    </div>

    <!-- Gallery -->
    <div id="afterPhotosBox" class="section" style="margin-top: 30px;">
      <h3>📷 Your Volunteering Gallery</h3>
      <div id="photoGallery" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
    </div>
  </main>

  <footer style="margin-top: 50px; text-align: center;">
    <p>&copy; 2025 Volunteer Coin Project Foundation | LoveButton Token</p>
  </footer>

  <!-- Scripts -->
  <script type="module" src="./connectWallet.js"></script>
  <script type="module" src="./loginLogic.js"></script>
  <script type="module" src="./setupKycDom.js"></script>
</body>
</html>
