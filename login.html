<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveButton Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9f9f9;
    }
    #wallet-buttons {
      margin-top: 30px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
    #wallet-address {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Welcome to LoveButton</h1>
  <div class="section" id="volunteer-checkin" style="background:#fff0f5; padding:20px; border-radius:10px; margin-top:100px;"><h2>👷 Volunteer Check-In</h2>
  <p>Connect your wallet, snap a photo, and start tracking your volunteer time.</p></div>
<button id="connectWallet" onclick="unifiedConnect()">🔗 Connect Wallet</button>
<div id="walletAddress" style="margin-top: 10px;"></div>

  <!-- Start Section -->
    <div>
      <input type="file" accept="image/*" capture="environment" id="startPhoto" />
      <button id="startBtn" style="margin-top:5px;">📍 Start Volunteering</button>
    </div>

    <!-- Stop Section -->
    <div>
      <input type="file" accept="image/*" capture="environment" id="stopPhoto" />
      <button id="stopBtn" style="margin-top:5px;">✅ Stop Volunteering</button>
    </div>

  <div id="sessionSummary" style="margin-top:15px;"></div>

<script type="module">
  let sessionData = {
    wallet: null,
    startTime: null,
    startPhoto: null,
    stopTime: null,
    stopPhoto: null,
    location: null
  };

  // Simulated wallet connect
  document.getElementById("connectWallet").addEventListener("click", async function () {
  if (window.solana && window.solana.isPhantom) {
    try {
      const resp = await window.solana.connect();
      sessionData.wallet = resp.publicKey.toString();
      document.getElementById("walletAddress").innerText = "Wallet Connected: " + sessionData.wallet;
    } catch (err) {
      alert("Wallet connection failed: " + err.message);
    }
  } else {
    alert("Phantom Wallet not detected. Please install it from https://phantom.app");
  }
  });

  // Start Volunteering
  document.getElementById('startBtn').addEventListener('click', async () => {
    const fileInput = document.getElementById('startPhoto');
    if (!fileInput.files.length) {
      alert("Please upload a start photo!");
      return;
    }
    sessionData.startPhoto = fileInput.files[0];
    sessionData.startTime = new Date();

    // Get Geolocation
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          sessionData.location = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
        },
        (error) => {
          console.warn("Geolocation error:", error);
        }
      );
    }

    alert("Volunteer session started at " + sessionData.startTime.toLocaleString());
  });

  // Stop Volunteering
  document.getElementById('stopBtn').addEventListener('click', async () => {
    const fileInput = document.getElementById('stopPhoto');
    if (!fileInput.files.length) {
      alert("Please upload a stop photo!");
      return;
    }
    sessionData.stopPhoto = fileInput.files[0];
    sessionData.stopTime = new Date();

    // Calculate duration
    const ms = sessionData.stopTime - sessionData.startTime;
    const mins = Math.round(ms / 60000);
    const hours = (mins / 60).toFixed(2);
    const tokensEarned = Math.floor(hours * 1); // ⬅️ 1 LVBTN per hour, adjust if needed

    // Show session summary
    const summary = `
      <p><strong>Wallet:</strong> <p id="walletDisplay"></p>${sessionData.wallet}</p>
      <p><strong>Start:</strong> ${sessionData.startTime.toLocaleString()}</p>
      <p><strong>Stop:</strong> ${sessionData.stopTime.toLocaleString()}</p>
      <p><strong>Duration:</strong> ${hours} hours</p>
      <p><strong>Tokens Earned:</strong> ${tokensEarned} LVBTN</p>
      <p><strong>Location:</strong> ${sessionData.location?.lat ?? "N/A"}, ${sessionData.location?.lng ?? "N/A"}</p>
    `;
    document.getElementById('sessionSummary').innerHTML = summary;
  });
</script>



  
  <script>
    async function connectPhantom() {
      const provider = window.solana;
      if (provider && provider.isPhantom) {
        try {
          const resp = await provider.connect();
          document.getElementById('wallet-address').innerText = `Connected with Phantom: ${resp.publicKey.toString()}`;
        } catch (err) {
          alert("Phantom connection failed.");
        }
      } else {
        alert("Phantom wallet not found. Install it from https://phantom.app/");
      }
    }

    async function connectSolflare() {
      if (window.Solflare) {
        const solflare = new window.Solflare();
        if (!solflare.isConnected) {
          try {
            await solflare.connect();
            document.getElementById('wallet-address').innerText = `Connected with Solflare: ${solflare.publicKey.toString()}`;
          } catch (err) {
            alert("Solflare connection failed.");
          }
        }
      } else {
        alert("Solflare wallet not found. Install it from https://solflare.com/");
      }
    }

    // Button listeners
    document.getElementById("phantom-button").addEventListener("click", connectPhantom);
    document.getElementById("solflare-button").addEventListener("click", connectSolflare);
    <div id="login-summary" style="margin-top: 30px; display: none;"><h2>✅ Wallet Connected</h2>
  <p><strong>Wallet Address:</strong> <span id="summary-address"></span></p>
  <p><strong>Date:</strong> <span id="summary-date"></span></p>
  <p><strong>Token Balance:</strong> <span id="summary-balance"></span> LVBTN</p>
  <p><strong>Current Token Value:</strong> $2.50</p>
  <p><strong>Total Value:</strong> <span id="summary-total"></span></p>
  <p><strong>Milestone Achieved:</strong> <span id="summary-milestone"></span></p>
</div>
</script>
  <script>
  async function unifiedConnect() {
    const status = document.getElementById('status');

    if (window.solana && window.solana.isPhantom) {
      try {
        const resp = await window.solana.connect();
        status.innerText = `Connected: ${resp.publicKey.toString()}`;
        sessionStorage.setItem("walletAddress", resp.publicKey.toString());
        showVolunteerControls();
        return;
      } catch (err) {
        console.error("Phantom connection error", err);
      }
    }

    if (typeof Solflare !== "undefined") {
      const solflare = new Solflare();
      if (solflare.isSolflare) {
        try {
          await solflare.connect();
          status.innerText = `Connected: ${solflare.publicKey.toString()}`;
          sessionStorage.setItem("walletAddress", solflare.publicKey.toString());
          showVolunteerControls();
          return;
        } catch (err) {
          console.error("Solflare connection error", err);
        }
      } else {
        alert("Please install Solflare: https://solflare.com");
      }
    }

    if (!window.solana && typeof Solflare === "undefined") {
      alert("No compatible wallet found. Please install Phantom or Solflare.");
    }
  }

  function showVolunteerControls() {
    document.getElementById("start-button").style.display = "inline-block";
    document.getElementById("stop-button").style.display = "inline-block";
  }
</script>

  </script>

  <!-- Optional: Include Solflare SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@solflare-wallet/sdk@0.3.1/dist/index.iife.js"></script>
</body>
</html>
