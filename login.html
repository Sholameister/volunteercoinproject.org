<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – LoveButton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 350px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #ff4081;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .divider {
      margin: 20px 0;
      font-weight: bold;
    }
    a {
      color: #ff4081;
      text-decoration: none;
    }
  </style>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.loginWithEmail = () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          window.location.href = "index.html";
        })
        .catch((error) => {
          document.getElementById('error').innerText = error.message;
        });
    };

    window.loginWithWallet = async () => {
      try {
        const provider = window.phantom?.solana;
        if (!provider?.isPhantom) {
          alert("Phantom wallet not found. Please install it.");
          return;
        }

        const resp = await provider.connect();
        const walletAddress = resp.publicKey.toString();

        // Log in Firestore
        const timestamp = new Date().toISOString();
        await setDoc(doc(db, "walletLogins", walletAddress), {
          address: walletAddress,
          loginTime: timestamp
        });

        // Redirect or show success
        alert("Welcome back Volunteers!\nWallet: " + walletAddress);
        window.location.href = "index.html";

      } catch (err) {
        console.error(err);
        alert("Error connecting to wallet: " + err.message);
      }
    };
  </script>
</head>

<body>
  <div class="login-box">
    <h2>Login to LoveButton</h2>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="loginWithEmail()">Login with Email</button>

    <div class="divider">or</div>

    <button onclick="loginWithWallet()">Connect Wallet</button>

    <p id="error" style="color: red; margin-top: 10px;"></p>
    <p style="margin-top: 20px;">Don’t have an account? <a href="http://signup.html" target="_blank" rel="noopener">Sign up here</a></p>
  </div>
</body>
</html>
