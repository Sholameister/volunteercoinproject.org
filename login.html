<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveButton Wallet Login</title>

  <!-- Solana Wallet Adapter + Web3.js -->
  <script src="https://unpkg.com/@solana/wallet-adapter-wallets@latest/lib/umd/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff0f2;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #c72c48; }
    .wallet-btn {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      background-color: #c72c48;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome Back Volunteers!</h1>
  <p>Connect your wallet to continue</p>

  <!-- Wallet Buttons -->
  <button class="wallet-btn" onclick="connectPhantom()">Connect Phantom</button>
  <button class="wallet-btn" onclick="connectSolflare()">Connect Solflare</button>

  <h3>⏳ Track My Volunteer Time</h3>

  <p><strong>Upload BEFORE photo:</strong></p>
  <input type="file" id="beforePhoto" accept="image/*"><br><br>

  <p><strong>Upload AFTER photo:</strong></p>
  <input type="file" id="afterPhoto" accept="image/*"><br><br>

  <button class="wallet-btn" onclick="startVolunteerSession()">Start Volunteering</button>
  <button class="wallet-btn" onclick="stopVolunteerSession()">Stop Volunteering</button>

  <div id="sessionStatus" style="margin-top: 20px;"></div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none; padding: 20px; margin-top: 20px;">
    <h2>📊 Volunteer Dashboard</h2>
    <p><strong>Wallet Connected:</strong> <span id="walletAddressDisplay"></span></p>
    <div id="volunteerDataDisplay"><p>Loading your data...</p></div>
  </div>

  <script>
    // Firebase setup
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.firebasestorage.app",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8",
      measurementId: "G-0261HYV08P"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentWallet = null;
    let startTime = null;

    async function connectPhantom() {
      const provider = window.solana;
      if (provider?.isPhantom) {
        const resp = await provider.connect();
        currentWallet = resp.publicKey.toString();
        document.getElementById("walletAddressDisplay").innerText = currentWallet;
        document.getElementById("dashboard").style.display = "block";
        localStorage.setItem("walletAddress", currentWallet);
      } else {
        alert("Phantom not found.");
      }
    }

    async function connectSolflare() {
      try {
        const solflare = new window.Solflare();
        await solflare.connect();
        currentWallet = solflare.publicKey.toString();
        document.getElementById("walletAddressDisplay").innerText = currentWallet;
        document.getElementById("dashboard").style.display = "block";
        localStorage.setItem("walletAddress", currentWallet);
      } catch {
        alert("Solflare not available.");
      }
    }

    window.startVolunteerSession = () => {
      const beforePhoto = document.getElementById("beforePhoto");
      if (!beforePhoto.files.length) {
        alert("Upload BEFORE photo before starting.");
        return;
      }

      startTime = new Date();
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        localStorage.setItem("sessionStart", JSON.stringify({
          time: startTime.toISOString(),
          lat, lng
        }));
        document.getElementById("sessionStatus").innerText =
          `⏱️ Started at ${startTime.toLocaleTimeString()} @ (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
      });
    };

    window.stopVolunteerSession = () => {
      const afterPhoto = document.getElementById("afterPhoto");
      if (!afterPhoto.files.length) {
        alert("Upload AFTER photo before stopping.");
        return;
      }

      const stopTime = new Date();
      const wallet = localStorage.getItem("walletAddress");
      const startData = JSON.parse(localStorage.getItem("sessionStart"));
      if (!startData) {
        alert("Start session first.");
        return;
      }

      const duration = (stopTime - new Date(startData.time)) / (1000 * 60 * 60);
      const tokensEarned = Math.round(duration * 100) / 100;
      const usdValue = tokensEarned * 2.5;

      navigator.geolocation.getCurrentPosition(async (pos) => {
        const stopLat = pos.coords.latitude;
        const stopLng = pos.coords.longitude;

        try {
          await db.collection("volunteerSessions").add({
            wallet,
            startTime: new Date(startData.time),
            stopTime,
            durationHours: duration,
            tokensEarned,
            usdValue,
            startLocation: { lat: startData.lat, lng: startData.lng },
            stopLocation: { lat: stopLat, lng: stopLng },
            activity: "General Volunteering",
            date: stopTime.toLocaleDateString()
          });

          document.getElementById("sessionStatus").innerHTML = `
            ✅ Session saved!<br>
            ⌛ Duration: ${duration.toFixed(2)} hrs<br>
            💖 LVBTN Earned: ${tokensEarned}<br>
            💵 Value: $${usdValue.toFixed(2)}
          `;

          // Clear file inputs
          document.getElementById("beforePhoto").value = "";
          document.getElementById("afterPhoto").value = "";

        } catch (err) {
          console.error("❌ Error saving session:", err);
        }
      });
    };
  </script>
</body>
</html>
