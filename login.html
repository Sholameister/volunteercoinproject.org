<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LoveButton Volunteer Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
</head>
<body style="font-family: Arial, sans-serif; background-color: #fff0f5; text-align: center; padding: 20px;">
  <h1>❤️ Welcome Volunteers!</h1>

  <button id="connectWalletBtn">🔗 Connect Phantom Wallet</button>
  <p id="walletAddressDisplay"></p>

  <input type="file" accept="image/*" id="beforePhotoInput" style="display: none;" />
  <button id="uploadBeforePhotoBtn" disabled>📸 Upload BEFORE Photo</button>

  <button id="startBtn" disabled>✅ Start Volunteering</button>

  <input type="file" accept="image/*" id="afterPhotoInput" style="display: none;" />
  <button id="uploadAfterPhotoBtn" disabled>📸 Upload AFTER Photo</button>

  <button id="stopBtn" disabled>🛑 Stop Volunteering</button>

  <div id="summaryBox" style="margin-top: 30px; padding: 15px; border: 2px solid #e60073; border-radius: 8px; background: #fff;">
    <h2>Session Summary</h2>
    <p id="sessionDetails"></p>
    <div id="afterPhotosBox"></div>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.appspot.com",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let walletAddress = null;
    let sessionStartTime = null;
    let beforePhotoURL = null;
    let afterPhotoURL = null;

    document.getElementById('connectWalletBtn').addEventListener('click', async () => {
      try {
        const provider = window.phantom?.solana;
        if (!provider || !provider.isPhantom) {
          alert('Please install Phantom Wallet!');
          return;
        }
        const resp = await provider.connect();
        walletAddress = resp.publicKey.toString();
        document.getElementById('walletAddressDisplay').textContent = `Wallet: ${walletAddress}`;
        document.getElementById('beforePhotoInput').style.display = 'block';
        document.getElementById('uploadBeforePhotoBtn').disabled = false;
      } catch (err) {
        alert('Wallet connection failed.');
        console.error(err);
      }
    });

    document.getElementById('uploadBeforePhotoBtn').addEventListener('click', async () => {
      const file = document.getElementById('beforePhotoInput').files[0];
      if (!file || !walletAddress) return;
      const ref = storage.ref().child(`volunteerPhotos/${walletAddress}/before_${Date.now()}.jpg`);
      await ref.put(file);
      beforePhotoURL = await ref.getDownloadURL();
      alert('Before photo uploaded!');
      document.getElementById('afterPhotoInput').style.display = 'block';
      document.getElementById('startBtn').disabled = false;
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      sessionStartTime = new Date();
      alert(`You have begun volunteering!\nStart: ${sessionStartTime}`);
    });

    document.getElementById('uploadAfterPhotoBtn').addEventListener('click', async () => {
      const file = document.getElementById('afterPhotoInput').files[0];
      if (!file || !walletAddress) return;
      const ref = storage.ref().child(`volunteerPhotos/${walletAddress}/after_${Date.now()}.jpg`);
      await ref.put(file);
      afterPhotoURL = await ref.getDownloadURL();
      alert('After photo uploaded!');
      document.getElementById('stopBtn').disabled = false;
    });

    document.getElementById('stopBtn').addEventListener('click', async () => {
      const sessionEndTime = new Date();
      const durationMs = sessionEndTime - sessionStartTime;
      const hours = Math.max(1, Math.round(durationMs / (1000 * 60 * 60)));

      // Determine tier
      let tierMultiplier = 1.0;
      const kycDoc = await db.collection("verifiedKYC").doc(walletAddress).get();
      if (kycDoc.exists) {
        const tier = kycDoc.data().tier;
        if (tier === 2) tierMultiplier = 1.25;
        if (tier === 3) tierMultiplier = 1.5;
      }

      const tokensEarned = hours * tierMultiplier;
      const usdValue = tokensEarned * 2.5;

      await db.collection("volunteerSessions").add({
        wallet: walletAddress,
        timestampStart: sessionStartTime,
        timestampEnd: sessionEndTime,
        durationHours: hours,
        tokensEarned,
        usdValue,
        beforePhotoURL,
        afterPhotoURL,
        createdAt: new Date()
      });

      const summary = `
        ⏰ Start: ${sessionStartTime.toLocaleString()}<br>
        ⏰ End: ${sessionEndTime.toLocaleString()}<br>
        🧮 Duration: ${hours} hour(s)<br>
        💖 Tokens Earned: ${tokensEarned.toFixed(2)} LVBTN<br>
        💼 Wallet Total: (Live wallet balance not yet integrated)<br>
        💵 USD Value This Session: $${usdValue.toFixed(2)}
      `;

      document.getElementById('sessionDetails').innerHTML = summary;

      // Load all past afterPhotos
      const snapshot = await db.collection("volunteerSessions")
        .where("wallet", "==", walletAddress)
        .orderBy("timestampEnd", "desc")
        .get();

      let galleryHTML = '<h3>📸 Past Accomplishments:</h3>';
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.afterPhotoURL) {
          galleryHTML += `<img src="${data.afterPhotoURL}" width="200" style="margin: 5px; border-radius: 6px;" />`;
        }
      });

      document.getElementById('afterPhotosBox').innerHTML = galleryHTML;
    });
  </script>
</body>
</html>
