<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volunteer Session Logger</title>
  <link rel="stylesheet" href="styles.css">

<!-- Solana Wallet Adapter UMD (Phantom, Solflare, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-wallets@0.18.0/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-base@0.9.0/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.73.3/lib/index.iife.min.js"></script>
  
  <style>
    body {
      background-color: #fdf2f8;
      font-family: 'Arial', sans-serif;
      padding: 20px;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #e60073;
      margin-bottom: 5px;
    }

    .step {
      margin: 25px 0;
    }

    button, input[type="file"] {
      display: block;
      margin: 12px auto;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      width: 90%;
      max-width: 400px;
      border: none;
    }

    button {
      background-color: #e60073;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #cc005f;
    }

    input[type="file"] {
      background-color: #fff;
      border: 2px dashed #ccc;
      padding: 18px;
    }

    #summaryBox, #afterPhotosBox {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: #fff;
      display: none;
    }

    .after-photo {
      width: 100px;
      height: auto;
      margin: 10px;
      border-radius: 8px;
    }

    #lvbtnPrice {
      margin-top: 15px;
      font-weight: bold;
    }

    #walletAddress, #kycStatus, #tierInfo {
      font-weight: bold;
      margin-top: 10px;
    }

    @media screen and (max-width: 600px) {
      h1 { font-size: 22px; }
      button, input[type="file"] {
        width: 95%;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <h1>Log Your Volunteer Session</h1>
  <div class="step">
    <button id="connectWalletBtn">1️⃣ Connect Phantom Wallet</button>
    <div id="walletAddress">Wallet: Not Connected</div>
    <div id="kycStatus">KYC: Unknown</div>
    <div id="tierInfo">Tier: Unknown</div>
  </div>

  <div class="step">
    <label for="beforePhoto">2️⃣ Take Start Photo</label>
    <input type="file" id="beforePhoto" accept="image/*" capture="environment" disabled>
  </div>

  <div class="step">
    <label for="afterPhoto">3️⃣ Take Finish Photo</label>
    <input type="file" id="afterPhoto" accept="image/*" capture="environment" disabled>
  </div>

  <div id="summaryBox">
    <h3>Session Summary</h3>
    <p id="sessionTimes"></p>
    <p id="tokensEarned"></p>
    <p id="totalLVBTN"></p>
    <p id="usdValue"></p>
    <p id="lvbtnPrice">Fetching LVBTN price...</p>
  </div>

  <div id="afterPhotosBox">
    <h3>Past After-Photos</h3>
    <div id="photoGallery"></div>
  </div>

  <!-- Firebase SDK scripts -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- Firebase init -->
<script>
  const firebaseConfig = {
    apiKey: "...",
    authDomain: "...",
    projectId: "...",
    storageBucket: "..."
  };
  firebase.initializeApp(firebaseConfig);
</script>

<!-- Wallet connect logic -->
<script>
  document.getElementById('connectWalletBtn').addEventListener('click', async () => {
    if (window.solana && window.solana.isPhantom) {
      try {
        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();
        document.getElementById('walletAddress').textContent = 'Wallet: ' + wallet;
        document.getElementById('beforePhoto').disabled = false;
        document.getElementById('kycStatus').textContent = 'KYC: Loading...';
        document.getElementById('tierInfo').textContent = 'Tier: Loading...';
      } catch (err) {
        alert('Wallet connection failed: ' + err.message);
      }
    } else {
      alert('Phantom Wallet not found. Please install it.');
    }
  });

// Fetch KYC and Tier from Firestore
const db = firebase.firestore();
const docRef = db.collection("volunteers").doc(wallet);

docRef.get().then((doc) => {
  if (doc.exists) {
    const data = doc.data();
    document.getElementById('kycStatus').textContent = 'KYC: ' + (data.kycStatus || 'Not Found');
    document.getElementById('tierInfo').textContent = 'Tier: ' + (data.tierLevel || 'Not Found');
  } else {
    document.getElementById('kycStatus').textContent = 'KYC: Not Found';
    document.getElementById('tierInfo').textContent = 'Tier: Not Found';
  }
}).catch((error) => {
  console.error("Error fetching KYC/Tier:", error);
  document.getElementById('kycStatus').textContent = 'KYC: Error';
  document.getElementById('tierInfo').textContent = 'Tier: Error';
});

// Enable "Stop Volunteering" (afterPhoto) after beforePhoto is selected
document.getElementById('beforePhoto').addEventListener('change', function () {
  if (this.files.length > 0) {
    document.getElementById('afterPhoto').disabled = false;
    alert('Before photo uploaded. You can now upload your after photo when ready.');
  }
});
</script>
<!-- Your existing logic file -->
<script src="loginLogic.js"></script>

  <!-- Main Logic -->
  <script src="loginLogic.js"></script>
</body>
</html>
