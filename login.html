<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveButton Login</title>

  <!-- Wallet Adapter CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-wallets@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-base@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-core@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-react@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-react-ui@latest/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@solana/wallet-adapter-react-ui/styles.css"></script>

  <!-- Solana Web3 -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9f9f9;
    }
    #wallet-buttons {
      margin-top: 30px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
    }
    #wallet-address {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Welcome to LoveButton</h1>
  <p>Connect your wallet to begin:</p>

  <div id="wallet-buttons">
    <button onclick="connectWallet('Phantom')">Connect Phantom</button>
    <button onclick="connectWallet('Solflare')">Connect Solflare</button>
    <button onclick="connectWallet('Backpack')">Connect Backpack</button>
  </div>

  <div id="wallet-address"></div>

  <script>
    const wallets = {
      Phantom: window.solana,
      Solflare: new window.Solflare(),
      Backpack: new window.BackpackWalletAdapter?.()
    };

    async function connectWallet(type) {
      const wallet = wallets[type];
      if (!wallet) {
        alert(`${type} Wallet not detected`);
        return;
      }

      try {
        const response = await wallet.connect();
        const address = wallet.publicKey?.toString() || response.publicKey?.toString();
        document.getElementById("wallet-address").innerText = `Connected: ${address}`;
        // Optional: log to Firebase or store session
      } catch (error) {
        console.error("Connection failed:", error);
        alert(`Error connecting to ${type} wallet`);
      }
    }
  </script>
</body>
</html>
