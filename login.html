<!DOCTYPE html>
<html lang="en">
<head>
  <title>LoveButton Volunteer Logger</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background-color: #fdf2f8;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #e60073;
    }
    input, button {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      background-color: #e60073;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc005f;
    }
    #summaryBox, #afterPhotosBox {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background-color: #fff0f5;
      border: 1px solid #e60073;
      display: none;
    }
    img.afterPhoto {
      max-width: 150px;
      margin: 5px;
      border-radius: 8px;
      border: 2px solid #e60073;
    }
  </style>
 <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-storage-compat.js"></script>

</head>
<body>

  <h1>Volunteer Reward Tracker</h1>

  <button onclick="connectWallet()">Connect Phantom Wallet</button>
  <p id="walletAddress"></p>


  <script>
  let legacyWallets = [];

  async function fetchLegacyWallets() {
    try {
      const res = await fetch("https://raw.githubusercontent.com/sholameister/volunteercoinproject.org/main/legacy_wallets.json");
      const data = await res.json();
      legacyWallets = data.blocked_wallets.map(w => w.toLowerCase());
    } catch (e) {
      console.error("Failed to load legacy wallet list:", e);
    }
  }

  async function checkWallet(walletAddress) {
    const cleanAddress = walletAddress.toLowerCase();
    if (legacyWallets.includes(cleanAddress)) {
     document.body.innerHTML = ` 
   <div style="text-align:center; padding:40px; background-color:#fff0f0; color:#b00000; font-family:sans-serif;">
      <h1>🚫 This Wallet is Blocked</h1>
      <p>This wallet has been flagged by the Volunteer Coin Project Foundation as holding legacy or unrecognized LVBTN tokens.</p>
      <p><strong>All LVBTN in this wallet are considered void and unsupported.</strong></p>
      <p>You have <strong>10 days to appeal</strong> this decision by contacting:<br>
      <a href="mailto:info@VolunteerCoinProject.org">info@VolunteerCoinProject.org</a></p>
    </div>
  `;
  throw new Error("Wallet is blocked – session terminated.");
}  
    
    return true;
  }

 
  // Example usage after connecting wallet:
  // onWalletConnect("EgNa...Uup");
</script>
  <h3>Before Photo</h3>
  <input type="file" id="beforePhoto" accept="image/*">
  <button onclick="startVolunteering()">Start Time Volunteering</button>
 
  <h3>After Photo</h3>
  <input type="file" id="afterPhoto" accept="image/*">
 <button onclick="stopVolunteering()">Stop Time Volunteering</button>
  <div id="summaryBox"></div>
  <div id="afterPhotosBox"></div>
<div id="totalsBox" style="margin-top: 30px; padding: 20px; background-color: #f0f8ff; border-radius: 10px; border: 1px solid #e60073; display: none;"><h3>📊 My Totals</h3>
  <p id="totalSessions"></p>
  <p id="totalLVBTN"></p>
  <p id="totalUSD"></p>
  <p id="lastDate"></p>
</div>

<div id="galleryBox" style="margin-top: 30px; padding: 20px; background-color: #fffaf0; border-radius: 10px; border: 1px solid #e60073; display: none;">
  <h3>📷 My Joy Gallery</h3>
  <div id="galleryPhotos" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
</div>
 
  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCLLrOx4jWJ1PN8xFFxNhIryx3NshADKVY",
      authDomain: "lovebutton-heaven.firebaseapp.com",
      projectId: "lovebutton-heaven",
      storageBucket: "lovebutton-heaven.firebasestorage.app",
      messagingSenderId: "1079456151721",
      appId: "1:1079456151721:web:15d2aa1171d977da8c11b8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let walletAddress = "";
    let sessionStartTime = null;
    let sessionGeo = "";

    async function connectWallet() {
      window.connectWallet = connectWallet;
      if (window.solana && window.solana.isPhantom) {
        try {
          const resp = await window.solana.connect();
          walletAddress = resp.publicKey.toString();
          document.getElementById("walletAddress").innerText = "Wallet: " + walletAddress;
          await checkWallet(walletAddress);
        } catch (err) {
          alert("Wallet connection rejected.");
        }
      } else {
        alert("Phantom wallet not found. Please install Phantom.");
      }
    }

  let blockedWallets = [];


    async function startVolunteering() {
      window.startVolunteering = startVolunteering;
      const beforePhoto = document.getElementById("beforePhoto").files[0];
      if (!walletAddress) return alert("Connect your wallet first.");
      if (!beforePhoto) return alert("Upload your BEFORE photo first.");

      sessionStartTime = new Date();
      sessionGeo = await getLocation();
      
localstorage.setItem("volunteerSessionStart", sessionStartTime.toISOString());
localstorage.setItem("volunteerGeo", sessionGeo);
localstorage.setItem("volunteerWallet", walletAddress);
      
      alert(`✅ You have begun volunteering for Volunteer Coin Project Foundation!
📅 ${sessionStartTime.toLocaleDateString()}
🕒 ${sessionStartTime.toLocaleTimeString()}
📍 ${sessionGeo}`);

      console.log("Session started at", sessionStartTime);
    }

    async function stopVolunteering() {
      window.stopVolunteering = stopVolunteering;
      const afterPhoto = document.getElementById("afterPhoto").files[0];
      if (!walletAddress) return alert("Connect your wallet first.");
      if (!afterPhoto) return alert("Upload your AFTER photo first.");
      if (!sessionStartTime) return alert("Click START before STOP.");

      const sessionEndTime = new Date();
      const durationMs = sessionEndTime - sessionStartTime;
      const hours = parseFloat((durationMs / 3600000).toFixed(2));
      const tokens = hours;
      const rate = 2.5;
      const usd = parseFloat((tokens * rate).toFixed(2));

     try {
       const afterRef = storage.ref().child(`afterPhoto/${walletAddress}_${Date.now()}`);
       await afterRef.put(afterPhoto);
       const afterUrl = await afterRef.getDownloadURL();

        await db.collection("volunteerSessions").add({
         wallet: walletAddress,
         timestampStart: firebase.firestore.Timestamp.fromDate(sessionStartTime),
         timestampEnd: firebase.firestore.Timestamp.fromDate(sessionEndTime),
         durationHours: hours,
         tokensEarned: tokens,
         usdValue: usd,
         afterPhotoUrl: afterUrl,
         createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
       await loadVolunteerDashboard();
   } catch (e) {
  console.error("❌ Failed to save session to Firestore:", e);
  alert("Could not save session data.");
  return;
} 


      // Reset
      sessionStartTime = null;
      sessionGeo = "";
    }

    function getLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve("Geolocation not supported.");
        } else {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const lat = pos.coords.latitude.toFixed(4);
              const lon = pos.coords.longitude.toFixed(4);
              resolve(`Lat: ${lat}, Lon: ${lon}`);
            },
            () => resolve("Location access denied.")
          );
        }
      });
    }
     async function loadVolunteerDashboard() {
  if (!walletAddress) return;

  try {
    const snapshot = await db.collection("volunteerSessions")
      .where("wallet", "==", walletAddress)
      .orderBy("timestampEnd", "desc")
      .get();

    if (snapshot.empty) return;

    let totalTokens = 0;
    let totalUSD = 0;
    let sessions = [];
    let lastDate = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      sessions.push(data);
      totalTokens += data.tokensEarned || 0;
      totalUSD += data.usdValue || 0;
      if (!lastDate) {
        const d = data.timestampEnd?.toDate();
        lastDate = d ? d.toLocaleDateString() : "";
      }
    });

    // Show Totals Box
    document.getElementById("totalsBox").style.display = "block";
    document.getElementById("totalSessions").innerText = `Total Sessions: ${sessions.length}`;
    document.getElementById("totalLVBTN").innerText = `Total LVBTN Earned: ${totalTokens.toFixed(2)}`;
    document.getElementById("totalUSD").innerText = `Total Value (@ $2.50): $${totalUSD.toFixed(2)}`;
    document.getElementById("lastDate").innerText = `Last Volunteered: ${lastDate}`;

    // Show Gallery Box
    document.getElementById("galleryBox").style.display = "block";
    const galleryDiv = document.getElementById("galleryPhotos");
    galleryDiv.innerHTML = "";
    sessions.forEach(s => {
      if (s.afterPhotoUrl) {
        const img = document.createElement("img");
        img.src = s.afterPhotoUrl;
        img.alt = "Volunteer photo";
        img.className = "afterPhoto";

        const info = document.createElement("div");
        info.style.textAlign = "center";
        info.style.margin = "10px";
        info.appendChild(img);
        const cap = document.createElement("p");
        cap.innerText = `${s.tokensEarned} LVBTN`;
        info.appendChild(cap);

        galleryDiv.appendChild(info);
      }
    });
  } catch (e) {
    console.error("Error loading dashboard:", e);
  }
}
    window.addEventListener("load", async () => {
  const storedStart = localStorage.getItem("volunteerSessionStart");
  const storedGeo = localStorage.getItem("volunteerGeo");
  const storedWallet = localStorage.getItem("volunteerWallet");

  if (window.solana && window.solana.isPhantom) {
    try {
      const resp = await window.solana.connect({ onlyIfTrusted: true });
      const connectedWallet = resp.publicKey.toString();

      if (storedStart && storedGeo && storedWallet === connectedWallet) {
        walletAddress = connectedWallet;
        sessionStartTime = new Date(storedStart);
        sessionGeo = storedGeo;

        document.getElementById("walletAddress").innerText = "Wallet: " + walletAddress;

        alert(`⏳ Resumed volunteering session!
📅 ${sessionStartTime.toLocaleDateString()}
🕒 ${sessionStartTime.toLocaleTimeString()}
📍 ${sessionGeo}`);

        console.log("✅ Session resumed from storage.");
      }
    } catch (err) {
      console.warn("🛑 Silent wallet connect failed or rejected.");
    }
  }
});

  </script>
 
</body>
  
</html>
