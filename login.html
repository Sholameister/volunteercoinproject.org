<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>Volunteer Session Logger</title>
 
  <!-- Solana Wallet Adapter UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.73.3/lib/index.iife.min.js"></script>

  <style>
    body {
      background-color: #fdf2f8;
      font-family: 'Arial', sans-serif;
      padding: 20px;
      margin: 0;
      text-align: center;
    }
    h1 {
      color: #e60073;
      margin-bottom: 5px;
    }
    .step {
      margin: 25px 0;
    }
    button, input[type="file"] {
      display: block;
      margin: 12px auto;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      width: 90%;
      max-width: 400px;
      border: none;
    }
    button {
      background-color: #e60073;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #cc005f;
    }
    input[type="file"] {
      background-color: #fff;
      border: 2px dashed #ccc;
      padding: 18px;
    }
    #summaryBox, #afterPhotosBox {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background-color: #fff;
      display: none;
    }
    .after-photo {
      max width: 100px;
      margin: 5px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #lvbtnPrice {
      margin-top: 15px;
      font-weight: bold;
    }
    #walletAddress, #kycStatus, #tierInfo {
      font-weight: bold;
      margin-top: 10px;
    }
    #progressContainer {
      margin-top: 20px;
    }
    .progress-bar {
      width: 90%;
      max-width: 400px;
      height: 20px;
      background-color: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px auto;
    }
    .progress-fill {
      height: 100%;
      text-align: right;
      padding-right: 8px;
      line-height: 20px;
      color: white;
      background-color: #e60073;
      width: 0;
    }
  </style>
   <script type="module" src="./loginLogic.js"></script>
  <script type="module" src="./kycUtils.js"></script>
</head>
  
<body>

  <h1>Log Your Volunteer Session</h1>

  <div class="step">
    <button id="connectWalletBtn">1️⃣ Connect Wallet (Phantom or Solflare)</button>
    <p id="walletAddress"></p>
    <div id="walletAddress">Wallet: Not Connected</div>
    <div id="kycStatus">KYC: Unknown</div>
    <div id="tierInfo">Tier: Unknown</div>
  </div>

  <div id="progressContainer">
    <h4>Tier Progress</h4>
    <div class="progress-bar"><div id="progressFill" class="progress-fill">0%</div></div>
  </div>

  <div class="step">
    <label for="beforePhoto">2️⃣ Take Start Photo to Begin</label>
    <input type="file" id="beforePhoto" accept="image/*" capture="environment" />
  </div>

  <div class="step">
    <label for="afterPhoto">3️⃣ Take Finish Photo to End</label>
    <input type="file" id="afterPhoto" accept="image/*" capture="environment" />
  </div>

  <div id="summaryBox">
    <h3>Session Summary</h3>
    <p id="sessionTimes"></p>
    <p id="tokensEarned"></p>
    <p id="totalLVBTN"></p>
    <p id="usdValue"></p>
    <p id="lvbtnPrice">Fetching LVBTN price...</p>
  </div>

  <div id="afterPhotosBox">
    <h3>Past After-Photos</h3>
    <div id="photoGallery"></div>
  </div>
  <!-- Your existing HTML content above -->

<!-- 👇 Insert this just before </body> -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const connectBtn = document.getElementById('connectWalletBtn');

    connectBtn?.addEventListener('click', async () => {
      const provider = window?.phantom?.solana;

      if (!provider?.isPhantom) {
        alert("Phantom Wallet not found. Please install it.");
        return;
      }

      try {
        const resp = await provider.connect();
        const walletAddress = resp.publicKey.toString();

        document.getElementById("walletAddress").innerText = walletAddress;
        console.log("Connected to wallet:", walletAddress);
      } catch (err) {
        console.error("Wallet connection failed:", err);
        alert("Wallet connection failed. Check console for details.");
      }
    });
  });
</script>

</body>
</html>
