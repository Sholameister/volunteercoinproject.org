# .github/workflows/firebase-hosting-live.yml
name: Deploy to Firebase Hosting on push to main
on:
  push:
    branches:
      - main   # Change if your default branch is different

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional build step — only keep if you actually build assets
      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOVEBUTTON_HEAVEN }}'
          channelId: live
          projectId: lovebutton-heaven
